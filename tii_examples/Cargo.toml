name = "basic"

[[example]]
name = "shutdown"

[[example]]
name = "shutdown_multiple"

[[example]]
name = "shutdown_unix"

[[example]]
name = "tls"

[[example]]
name = "static-content"

[[example]]
name = "wildcard"

[[example]]
name = "websocket"

[[example]]
name = "unix"

[[example]]
name = "websocket_broadcast"

[[example]]
name = "gzip"

